services:
  postgres:
    image: postgres:16-alpine
    container_name: morning-alarm-postgres
    environment:
      POSTGRES_DB: morning_alarm
      POSTGRES_USER: morning_alarm
      POSTGRES_PASSWORD: morning_alarm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U morning_alarm -d morning_alarm"]
      interval: 5s
      timeout: 5s
      retries: 20

  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: morning-alarm-server
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      SERVER_PUBLIC_URL: http://localhost:8080
      SERVER_DB_URL: jdbc:postgresql://postgres:5432/morning_alarm
      SERVER_DB_USER: morning_alarm
      SERVER_DB_PASSWORD: morning_alarm
      SERVER_DB_DRIVER: org.postgresql.Driver
      SERVER_DB_POOL_MAX_SIZE: 10
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
