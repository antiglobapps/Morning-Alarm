version = 1
updated_at = "2026-03-22"

[[entry]]
id = "DEV_ADMIN_EMAIL"
module = "shared-dev"
kind = "credential-identifier"
transport = "code-default"
owner = "shared"
consumers = ["server", "desktop-admin"]
required_in = ["dev"]
prod_policy = "not-used"
loader = "shared/src/commonMain/kotlin/com/morningalarm/api/auth/DevAdminDefaults.kt"
notes = "Default local admin email used when the dev server bootstraps an empty auth database."

[[entry]]
id = "DEV_ADMIN_PASSWORD"
module = "shared-dev"
kind = "secret"
transport = "code-default"
owner = "shared"
consumers = ["server", "desktop-admin"]
required_in = ["dev"]
prod_policy = "not-used"
loader = "shared/src/commonMain/kotlin/com/morningalarm/api/auth/DevAdminDefaults.kt"
notes = "Stable dev-only password for the default local admin account."

[[entry]]
id = "DEV_ADMIN_ACCESS_SECRET"
module = "shared-dev"
kind = "secret"
transport = "code-default"
owner = "shared"
consumers = ["server", "desktop-admin"]
required_in = ["dev"]
prod_policy = "not-used"
loader = "shared/src/commonMain/kotlin/com/morningalarm/api/auth/DevAdminDefaults.kt"
notes = "Dev-only fallback secret for admin login and protected admin API calls."

[[entry]]
id = "SERVER_DB_PASSWORD"
module = "server"
kind = "secret"
transport = "env"
owner = "server"
consumers = ["server"]
required_in = ["prod"]
dev_policy = "optional"
prod_policy = "env-or-secret-manager"
loader = "server/src/main/kotlin/com/morningalarm/server/bootstrap/AppConfig.kt"
notes = "Database password used by the backend runtime."

[[entry]]
id = "SERVER_JWT_SECRET"
module = "server"
kind = "secret"
transport = "env"
owner = "server"
consumers = ["server"]
required_in = ["prod"]
dev_policy = "falls-back-to-dev-only-default"
prod_policy = "env-or-secret-manager"
loader = "server/src/main/kotlin/com/morningalarm/server/bootstrap/AppConfig.kt"
notes = "JWT signing secret for bearer access tokens."

[[entry]]
id = "SERVER_ADMIN_BOOTSTRAP_SECRET"
module = "server"
kind = "secret"
transport = "env"
owner = "server"
consumers = ["server"]
required_in = ["prod-bootstrap"]
dev_policy = "optional"
prod_policy = "env-or-secret-manager"
loader = "server/src/main/kotlin/com/morningalarm/server/bootstrap/AppConfig.kt"
notes = "Secret required by server-side CLI admin bootstrap commands."

[[entry]]
id = "SERVER_ADMIN_ACCESS_SECRET"
module = "server"
kind = "secret"
transport = "env"
owner = "server"
consumers = ["server", "desktop-admin"]
required_in = ["prod"]
dev_policy = "falls-back-to-DEV_ADMIN_ACCESS_SECRET"
prod_policy = "env-or-secret-manager"
loader = "server/src/main/kotlin/com/morningalarm/server/bootstrap/AppConfig.kt"
notes = "Server-side admin access secret that desktop-admin must send during admin login and protected admin API calls."

[[entry]]
id = "POSTGRES_PASSWORD"
module = "local-infra"
kind = "secret"
transport = "docker-compose-env"
owner = "docker-compose"
consumers = ["postgres", "server"]
required_in = ["local-docker"]
prod_policy = "not-used"
loader = "docker-compose.yml"
notes = "Local Docker PostgreSQL password for the development stack."

[[entry]]
id = "FIGMA_TOKEN"
module = "design-app"
kind = "secret"
transport = "manual-cli-arg"
owner = "design-app"
consumers = ["design-app"]
required_in = ["manual-tooling"]
prod_policy = "not-app-runtime"
loader = "design-app/scripts/create-figma-variables.mjs"
notes = "Personal Figma token used by the local design tooling script."
